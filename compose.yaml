services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    environment:
      BACKEND_INTERNAL_URL: http://app:8000
      NODE_ENV: production
      # Set to "true" only once served over real HTTPS (reverse proxy / real domain).
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Domaine public du site, utilisé pour les URLs canoniques, l'Open Graph et le sitemap.
      SITE_URL: ${SITE_URL:-http://localhost:3000}
    ports:
      - "${FRONT_PORT:-3000}:3000"
    networks:
      - lesuffete-network

networks:
  lesuffete-network:
    name: lesuffete-network
    external: true
